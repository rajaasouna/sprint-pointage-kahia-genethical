<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Pointage — KAHIA-GENETHICAL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #f1f5f9; min-height: 100vh; }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #0f766e 0%, #1d4ed8 100%);
      color: white; padding: 20px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 20px; font-weight: 800; }
    .header p { font-size: 12px; opacity: .7; margin-top: 3px; }
    .live-badge {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.15); padding: 6px 14px;
      border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* KPIs */
    .kpis {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 16px; padding: 24px 28px 0;
    }
    .kpi {
      background: white; border-radius: 12px; padding: 20px;
      text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-top: 4px solid #0f766e;
    }
    .kpi-val { font-size: 32px; font-weight: 800; color: #0f766e; }
    .kpi-lbl { font-size: 12px; color: #64748b; margin-top: 5px; font-weight: 600; }
    .kpi:nth-child(2) { border-top-color: #1d4ed8; }
    .kpi:nth-child(2) .kpi-val { color: #1d4ed8; }
    .kpi:nth-child(3) { border-top-color: #059669; }
    .kpi:nth-child(3) .kpi-val { color: #059669; }
    .kpi:nth-child(4) { border-top-color: #dc2626; }
    .kpi:nth-child(4) .kpi-val { color: #dc2626; }

    /* UPDATE BAR */
    #last-update {
      font-size: 11px; color: #94a3b8;
      padding: 10px 28px; text-align: right;
    }

    /* TABLE SECTION */
    .section { padding: 0 28px 28px; }
    .section-title {
      font-size: 13px; font-weight: 800; color: #334155;
      text-transform: uppercase; letter-spacing: .05em;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    table {
      width: 100%; border-collapse: collapse;
      background: white; border-radius: 12px;
      overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    thead { background: #f8fafc; }
    th {
      padding: 12px 16px; text-align: left;
      font-size: 11px; color: #64748b;
      text-transform: uppercase; letter-spacing: .05em;
      font-weight: 700; border-bottom: 2px solid #e2e8f0;
    }
    td { padding: 12px 16px; border-top: 1px solid #f1f5f9; font-size: 13px; }
    tr:hover td { background: #f8fafc; }
    .new-row { animation: highlight .8s ease; }
    @keyframes highlight { from { background: #dcfce7; } to { background: transparent; } }

    /* BADGES */
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge-g { background: #dcfce7; color: #15803d; }
    .badge-r { background: #fee2e2; color: #dc2626; }
    .badge-y { background: #fef9c3; color: #854d0e; }

    /* EMPTY STATE */
    .empty {
      text-align: center; padding: 48px;
      color: #94a3b8; font-size: 14px;
    }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .kpis { grid-template-columns: repeat(2, 1fr); }
      .kpis, .section { padding-left: 16px; padding-right: 16px; }
      .header { flex-direction: column; gap: 12px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏥 Tableau de Bord Pointage GPS</h1>
    <p>KAHIA-GENETHICAL — Mise à jour automatique en temps réel</p>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE
  </div>
</div>

<div class="kpis">
  <div class="kpi">
    <div class="kpi-val" id="k-total">—</div>
    <div class="kpi-lbl">📍 Pointages aujourd'hui</div>
  </div>
  <div class="kpi">
    <div class="kpi-val" id="k-employes">—</div>
    <div class="kpi-lbl">👤 Employés actifs</div>
  </div>
  <div class="kpi">
    <div class="kpi-val" id="k-valides">—</div>
    <div class="kpi-lbl">✅ Validés</div>
  </div>
  <div class="kpi">
    <div class="kpi-val" id="k-hors">—</div>
    <div class="kpi-lbl">❌ Hors zone</div>
</div>
<div class="kpi">
    <div class="kpi-val" id="k-retards">—</div>
    <div class="kpi-lbl">⏰ Retards</div>
</div>
</div>

<div id="last-update">Chargement...</div>

<div class="section">
  <div class="section-title">📍 Derniers pointages</div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Téléphone</th>
        <th>Latitude</th>
        <th>Longitude</th>
        <th>Date / Heure</th>
        <th>Statut</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="6" class="empty">
        <div class="icon">⏳</div>
        Chargement des données...
      </td></tr>
    </tbody>
  </table>
</div>

<script>
  const SUPABASE_URL = 'https://kbigvliriqfowggwjfvh.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiaWd2bGlyaXFmb3dnZ3dqZnZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjQyNzEsImV4cCI6MjA5MDQ0MDI3MX0.vfYV3KlVuFhWEfm-eesTCmF34Qdm0TBG0rakLPV3Kpw';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  async function load() {
    const today = new Date().toISOString().split('T')[0];
    const { data, error } = await sb
      .from('pointages')
      .select('*')
      .gte('created_at', today)
      .order('created_at', { ascending: false });

    if (error) {
      console.error(error);
      document.getElementById('tbody').innerHTML = `
        <tr><td colspan="6" class="empty">
          <div class="icon">❌</div>
          Erreur de connexion : ${error.message}
        </td></tr>`;
      return;
    }

    // KPIs
    document.getElementById('k-total').textContent = data.length;
    document.getElementById('k-employes').textContent = [...new Set(data.map(r => r.telephone))].length;
    const presents = data.filter(r => {
      const d = new Date(r.created_at);
      d.setHours(d.getHours() + 1);
      return r.statut === 'valide' && d.getHours() < 8;
    });
const retards = data.filter(r => {
  const d = new Date(r.created_at);
  d.setHours(d.getHours() + 1);
  return r.statut === 'valide' && d.getHours() >= 8;
});
document.getElementById('k-valides').textContent = presents.length;
document.getElementById('k-hors').textContent = data.filter(r => r.statut === 'hors_zone').length;
document.getElementById('k-retards').textContent = retards.length;
    document.getElementById('last-update').textContent = '🕐 Mis à jour : ' + new Date().toLocaleTimeString('fr-FR');

    // Table
    if (data.length === 0) {
      document.getElementById('tbody').innerHTML = `
        <tr><td colspan="6" class="empty">
          <div class="icon">📭</div>
          Aucun pointage aujourd'hui
        </td></tr>`;
      return;
    }

    document.getElementById('tbody').innerHTML = data.map((r, i) => {
      const statut = r.statut || 'en_attente';
      const badgeClass = statut === 'valide' ? 'badge-g' : statut === 'hors_zone' ? 'badge-r' : 'badge-y';
      const d = new Date(r.created_at); d.setHours(d.getHours() + 1);
      const date = d.toLocaleString('fr-FR');
      const lat = r.latitude ? parseFloat(r.latitude).toFixed(6) : '—';
      const lon = r.longitude ? parseFloat(r.longitude).toFixed(6) : '—';
      return `<tr>
        <td style="color:#94a3b8;font-size:12px;">${r.id}</td>
        <td><strong>${r.telephone || '—'}</strong></td>
        <td style="font-family:monospace;font-size:12px;">${lat}</td>
        <td style="font-family:monospace;font-size:12px;">${lon}</td>
        <td style="color:#64748b;">${date}</td>
        <td><span class="badge ${badgeClass}">${statut}</span></td>
      </tr>`;
    }).join('');
  }

  // Realtime
  sb.channel('rt-pointages')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'pointages'
    }, (payload) => {
      console.log('Nouveau pointage reçu :', payload.new);
      load();
    })
    .subscribe();

  // Charger au démarrage
  load();

  // Rafraîchir toutes les 30s
  setInterval(load, 30000);
</script>

</body>
</html>
